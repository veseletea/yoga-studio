server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — toate rutele se duc la index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests la backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy H2 console
    location /h2-console/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}
