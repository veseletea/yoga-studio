services:
  backend:
    build: .
    container_name: yoga-backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/students"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: yoga-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
